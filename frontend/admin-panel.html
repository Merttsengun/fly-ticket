<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTicket – Admin Paneli</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Fly<span>Ticket</span></a>
  <span style="color:rgba(255,255,255,0.7);font-size:0.9rem" id="admin-name"></span>
  <button class="btn btn-outline btn-sm" id="logout-btn" style="color:#fff;border-color:#fff">Çıkış</button>
</nav>

<div class="admin-layout">
  <aside class="sidebar">
    <nav>
      <a href="#" class="active" id="tab-flights" onclick="showTab('flights');return false">&#9992; Uçuşlar</a>
      <a href="#" id="tab-tickets" onclick="showTab('tickets');return false">&#127903; Biletler</a>
    </nav>
  </aside>

  <main class="admin-content">

    <!-- FLIGHTS TAB -->
    <div id="flights-tab">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem">
        <h1>Uçuş Yönetimi</h1>
        <button class="btn btn-primary" onclick="openFlightModal()">+ Yeni Uçuş</button>
      </div>
      <div id="flights-alert"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Uçuş No</th>
              <th>Nereden</th>
              <th>Nereye</th>
              <th>Kalkış</th>
              <th>Varış</th>
              <th>Fiyat</th>
              <th>Koltuk</th>
              <th>İşlem</th>
            </tr>
          </thead>
          <tbody id="flights-body">
            <tr><td colspan="8" class="empty-state">Yükleniyor...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TICKETS TAB -->
    <div id="tickets-tab" style="display:none">
      <h1 style="margin-bottom:1.2rem">Rezervasyonlar</h1>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Referans</th>
              <th>Yolcu</th>
              <th>E-posta</th>
              <th>Uçuş</th>
              <th>Güzergah</th>
              <th>Kalkış</th>
              <th>Ücret</th>
              <th>İşlem</th>
            </tr>
          </thead>
          <tbody id="tickets-body">
            <tr><td colspan="8" class="empty-state">Yükleniyor...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- Flight Modal -->
<div class="modal-overlay" id="flight-modal">
  <div class="modal">
    <h3 id="modal-title">Yeni Uçuş Ekle</h3>
    <div id="modal-alert"></div>
    <form class="form-stack" id="flight-form">
      <input type="hidden" id="f-id">

      <div class="form-group">
        <label>Uçuş Numarası</label>
        <input type="text" id="f-number" placeholder="TK123" required>
      </div>
      <div class="form-group">
        <label>Nereden</label>
        <select id="f-from" required>
          <option value="">Şehir seçin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nereye</label>
        <select id="f-to" required>
          <option value="">Şehir seçin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Kalkış Zamanı</label>
        <input type="datetime-local" id="f-dep" required>
      </div>
      <div class="form-group">
        <label>Varış Zamanı</label>
        <input type="datetime-local" id="f-arr" required>
      </div>
      <div class="form-group">
        <label>Fiyat (₺)</label>
        <input type="number" id="f-price" min="1" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Toplam Koltuk</label>
        <input type="number" id="f-seats" value="100" min="1" required>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeFlightModal()">İptal</button>
        <button type="submit" class="btn btn-primary" id="modal-save-btn">Kaydet</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';
  let cities = [];
  let editingId = null;

  function authHeaders() {
    const token = localStorage.getItem('flyticket_token');
    return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  }

  async function checkAuth() {
    const token = localStorage.getItem('flyticket_token');
    if (!token) { location.href = 'admin-login.html'; return; }

    const res = await fetch(API + '/api/admin/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) { localStorage.removeItem('flyticket_token'); location.href = 'admin-login.html'; return; }
    const data = await res.json();
    document.getElementById('admin-name').textContent = data.username;
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    const token = localStorage.getItem('flyticket_token');
    await fetch(API + '/api/admin/logout', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    localStorage.removeItem('flyticket_token');
    location.href = 'admin-login.html';
  });

  function showTab(tab) {
    document.getElementById('flights-tab').style.display = tab === 'flights' ? 'block' : 'none';
    document.getElementById('tickets-tab').style.display = tab === 'tickets' ? 'block' : 'none';
    document.getElementById('tab-flights').classList.toggle('active', tab === 'flights');
    document.getElementById('tab-tickets').classList.toggle('active', tab === 'tickets');
    if (tab === 'tickets') loadTickets();
  }

  async function loadCities() {
    const res = await fetch(API + '/api/cities');
    cities = await res.json();
    const fromSel = document.getElementById('f-from');
    const toSel   = document.getElementById('f-to');
    cities.forEach(c => {
      fromSel.insertAdjacentHTML('beforeend', `<option value="${c.id}">${c.name}</option>`);
      toSel.insertAdjacentHTML('beforeend',   `<option value="${c.id}">${c.name}</option>`);
    });
  }

  async function loadFlights() {
    const res = await fetch(API + '/api/flights?all=true', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('flyticket_token') }
    });
    const flights = await res.json();
    const tbody = document.getElementById('flights-body');

    if (!flights.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Henüz uçuş eklenmemiş.</td></tr>';
      return;
    }

    const fmt = s => new Date(s).toLocaleString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

    tbody.innerHTML = flights.map(f => `
      <tr>
        <td><span class="flight-number">${f.flight_number}</span></td>
        <td>${f.departure_city}</td>
        <td>${f.arrival_city}</td>
        <td>${fmt(f.departure_time)}</td>
        <td>${fmt(f.arrival_time)}</td>
        <td>₺${Number(f.price).toLocaleString('tr-TR')}</td>
        <td>
          <span class="badge ${f.seats_available > 0 ? 'badge-green' : 'badge-red'}">
            ${f.seats_total - f.seats_available}/${f.seats_total}
          </span>
        </td>
        <td style="display:flex;gap:0.4rem">
          <button class="btn btn-outline btn-sm" onclick="editFlight(${f.id})">Düzenle</button>
          <button class="btn btn-danger btn-sm" onclick="deleteFlight(${f.id})">Sil</button>
        </td>
      </tr>`).join('');
  }

  function openFlightModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Yeni Uçuş Ekle';
    document.getElementById('flight-form').reset();
    document.getElementById('modal-alert').innerHTML = '';
    document.getElementById('flight-modal').classList.add('open');
  }

  function closeFlightModal() {
    document.getElementById('flight-modal').classList.remove('open');
  }

  async function editFlight(id) {
    const res = await fetch(API + '/api/flights/' + id);
    const f = await res.json();
    editingId = id;

    document.getElementById('modal-title').textContent = 'Uçuşu Düzenle';
    document.getElementById('f-number').value = f.flight_number;
    document.getElementById('f-price').value  = f.price;
    document.getElementById('f-seats').value  = f.seats_total;

    const toLocal = s => new Date(s).toISOString().slice(0, 16);
    document.getElementById('f-dep').value = toLocal(f.departure_time);
    document.getElementById('f-arr').value = toLocal(f.arrival_time);

    cities.forEach(c => {
      if (c.name === f.departure_city) document.getElementById('f-from').value = c.id;
      if (c.name === f.arrival_city)   document.getElementById('f-to').value   = c.id;
    });

    document.getElementById('modal-alert').innerHTML = '';
    document.getElementById('flight-modal').classList.add('open');
  }

  document.getElementById('flight-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true;

    const body = {
      flight_number:     document.getElementById('f-number').value.trim(),
      departure_city_id: parseInt(document.getElementById('f-from').value),
      arrival_city_id:   parseInt(document.getElementById('f-to').value),
      departure_time:    document.getElementById('f-dep').value,
      arrival_time:      document.getElementById('f-arr').value,
      price:             parseFloat(document.getElementById('f-price').value),
      seats_total:       parseInt(document.getElementById('f-seats').value)
    };

    const url    = editingId ? `${API}/api/flights/${editingId}` : `${API}/api/flights`;
    const method = editingId ? 'PUT' : 'POST';

    const res = await fetch(url, {
      method,
      headers: authHeaders(),
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (res.ok) {
      closeFlightModal();
      loadFlights();
    } else {
      document.getElementById('modal-alert').innerHTML =
        `<div class="alert alert-error">${data.error}</div>`;
    }
    btn.disabled = false;
  });

  async function deleteFlight(id) {
    if (!confirm('Bu uçuşu silmek istediğinizden emin misiniz?')) return;
    const res = await fetch(API + '/api/flights/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('flyticket_token') }
    });
    if (res.ok) {
      loadFlights();
    } else {
      const d = await res.json();
      document.getElementById('flights-alert').innerHTML =
        `<div class="alert alert-error">${d.error}</div>`;
    }
  }

  async function loadTickets() {
    const res = await fetch(API + '/api/tickets', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('flyticket_token') }
    });
    const tickets = await res.json();
    const tbody = document.getElementById('tickets-body');

    if (!tickets.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Henüz rezervasyon yok.</td></tr>';
      return;
    }

    const fmt = s => new Date(s).toLocaleString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

    tbody.innerHTML = tickets.map(t => `
      <tr>
        <td><strong>${t.booking_reference}</strong></td>
        <td>${t.passenger_name} ${t.passenger_surname}</td>
        <td>${t.passenger_email}</td>
        <td><span class="flight-number">${t.flight_number}</span></td>
        <td>${t.departure_city} → ${t.arrival_city}</td>
        <td>${fmt(t.departure_time)}</td>
        <td>₺${Number(t.price).toLocaleString('tr-TR')}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteTicket(${t.id})">İptal</button>
        </td>
      </tr>`).join('');
  }

  async function deleteTicket(id) {
    if (!confirm('Bu rezervasyonu iptal etmek istediğinizden emin misiniz?')) return;
    const res = await fetch(API + '/api/tickets/' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('flyticket_token') }
    });
    if (res.ok) loadTickets();
  }

  document.getElementById('flight-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeFlightModal();
  });

  checkAuth().then(() => {
    loadCities();
    loadFlights();
  });
</script>
</body>
</html>
