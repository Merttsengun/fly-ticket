<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTicket – Uçuş Ara</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Fly<span>Ticket</span></a>
  <div id="nav-user-area" style="display:flex;align-items:center;gap:1rem"></div>
</nav>

<div class="hero">
  <h1>Türkiye'nin Her Şehrine Uç</h1>
  <p>81 il arasında uygun fiyatlı uçuş biletleri</p>
</div>

<div class="search-wrapper">
  <div class="search-card">
    <h2>&#9992; Uçuş Ara</h2>
    <form action="index.html" method="GET">
      <div class="search-grid search-grid-5">
        <div class="form-group">
          <label for="from">Nereden</label>
          <select name="from" id="from">
            <option value="">Tüm şehirler</option>
          </select>
        </div>
        <div class="form-group">
          <label for="to">Nereye</label>
          <select name="to" id="to">
            <option value="">Tüm şehirler</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">Tarih</label>
          <input type="date" name="date" id="date">
        </div>
        <div class="form-group">
          <label for="airline">Havayolu</label>
          <select name="airline" id="airline">
            <option value="">Tüm Firmalar</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Ara</button>
      </div>
    </form>
  </div>
</div>

<div class="results-wrapper" id="results-section" style="display:none">
  <h2 id="results-title"></h2>
  <div id="results-list"></div>
</div>

<script>
  const API = 'http://localhost:3000';

  async function loadCities() {
    const res = await fetch(API + '/api/cities');
    const cities = await res.json();
    const fromSel = document.getElementById('from');
    const toSel   = document.getElementById('to');
    const params  = new URLSearchParams(window.location.search);
    const selectedFrom = params.get('from') || '';
    const selectedTo   = params.get('to')   || '';

    cities.forEach(c => {
      fromSel.insertAdjacentHTML('beforeend',
        `<option value="${c.id}" ${c.id == selectedFrom ? 'selected' : ''}>${c.name}</option>`);
      toSel.insertAdjacentHTML('beforeend',
        `<option value="${c.id}" ${c.id == selectedTo ? 'selected' : ''}>${c.name}</option>`);
    });
  }

  async function loadAirlines() {
    const res = await fetch(API + '/api/airlines');
    const airlines = await res.json();
    const sel = document.getElementById('airline');
    const params = new URLSearchParams(window.location.search);
    const selectedAirline = params.get('airline') || '';

    airlines.forEach(a => {
      sel.insertAdjacentHTML('beforeend',
        `<option value="${a.id}" ${a.id == selectedAirline ? 'selected' : ''}>${a.name} (${a.code})</option>`);
    });
  }

  async function searchFlights() {
    const params = new URLSearchParams(window.location.search);
    const from    = params.get('from');
    const to      = params.get('to');
    const date    = params.get('date');
    const airline = params.get('airline');

    const section = document.getElementById('results-section');
    const list    = document.getElementById('results-list');
    const title   = document.getElementById('results-title');
    section.style.display = 'block';

    const qs = new URLSearchParams();
    if (from)    qs.set('from', from);
    if (to)      qs.set('to', to);
    if (date)    qs.set('date', date);
    if (airline) qs.set('airline', airline);

    const res = await fetch(API + '/api/flights?' + qs.toString());
    const flights = await res.json();

    if (!Array.isArray(flights) || flights.length === 0) {
      title.textContent = (from || to || date || airline) ? 'Arama Sonuçları' : 'Mevcut Uçuşlar';
      list.innerHTML = '<div class="empty-state">Uygun uçuş bulunamadı.</div>';
      return;
    }

    title.textContent = (from || to || date || airline)
      ? `${flights.length} uçuş bulundu`
      : `${flights.length} uçuş mevcut`;

    list.innerHTML = flights.map(f => {
      const dep = new Date(f.departure_time);
      const arr = new Date(f.arrival_time);
      const fmt = d => d.toLocaleString('tr-TR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      const airlineBadge = f.airline_name
        ? `<span class="airline-badge">${f.airline_code} · ${f.airline_name}</span>`
        : '';
      return `
        <div class="flight-card">
          <div>
            <div class="flight-route">
              <span class="flight-city">${f.departure_city}</span>
              <span class="flight-arrow">→</span>
              <span class="flight-city">${f.arrival_city}</span>
              <span class="flight-number">${f.flight_number}</span>
              ${airlineBadge}
            </div>
            <div class="flight-time">${fmt(dep)} → ${fmt(arr)}</div>
          </div>
          <div>
            <div class="flight-price">₺${Number(f.price).toLocaleString('tr-TR')}</div>
            <div class="flight-seats">${f.seats_total - f.seats_available}/${f.seats_total} koltuk</div>
          </div>
          ${f.seats_available === 0
            ? '<span class="badge-full">DOLU</span>'
            : `<a href="booking.html?flight=${f.id}" class="btn btn-accent">Bilet Al</a>`
          }
        </div>`;
    }).join('');
  }

  document.getElementById('date').min = new Date().toISOString().split('T')[0];

  function setupNav() {
    const token = localStorage.getItem('flyticket_user_token');
    const name  = localStorage.getItem('flyticket_user_name');
    const area  = document.getElementById('nav-user-area');
    if (token && name) {
      area.innerHTML = `
        <a href="my-tickets.html">Biletlerim</a>
        <span style="color:rgba(255,255,255,0.75);font-size:0.85rem">👤 ${name}</span>
        <button class="btn btn-outline btn-sm" onclick="logout()" style="color:#fff;border-color:rgba(255,255,255,0.6)">Çıkış</button>
        <a href="admin-login.html" style="font-size:0.8rem;opacity:0.6">Admin</a>`;
    } else {
      area.innerHTML = `
        <a href="login.html">Giriş Yap</a>
        <a href="register.html" class="btn btn-accent btn-sm">Kayıt Ol</a>
        <a href="admin-login.html" style="font-size:0.8rem;opacity:0.6">Admin</a>`;
    }
  }

  async function logout() {
    const token = localStorage.getItem('flyticket_user_token');
    if (token) await fetch(API + '/api/auth/logout', { method:'POST', headers:{'Authorization':'Bearer '+token} }).catch(()=>{});
    localStorage.removeItem('flyticket_user_token');
    localStorage.removeItem('flyticket_user_name');
    localStorage.removeItem('flyticket_user_email');
    location.reload();
  }

  setupNav();
  Promise.all([loadCities(), loadAirlines()]).then(searchFlights);
</script>
</body>
</html>
