<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyTicket – Biletlerim</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Fly<span>Ticket</span></a>
  <div id="nav-user-area" style="display:flex;align-items:center;gap:1rem"></div>
</nav>

<div style="max-width:860px;margin:2.5rem auto;padding:0 1rem">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <h1 style="font-size:1.4rem;color:var(--text)">✈ Biletlerim</h1>
    <a href="index.html" class="btn btn-outline btn-sm">Yeni Uçuş Ara</a>
  </div>

  <div id="tickets-list"></div>
</div>

<script>
  const API = 'http://localhost:3000';

  const COLS = ['A','B','C','D','E','F'];
  function seatLabel(n) {
    if (!n) return '–';
    return `${Math.ceil(n / 6)}${COLS[(n - 1) % 6]}`;
  }

  function fmt(s) {
    return new Date(s).toLocaleString('tr-TR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
  }

  // Navbar
  function setupNav() {
    const token = localStorage.getItem('flyticket_user_token');
    const name  = localStorage.getItem('flyticket_user_name');
    const area  = document.getElementById('nav-user-area');
    if (token && name) {
      area.innerHTML = `
        <span style="color:rgba(255,255,255,0.8);font-size:0.85rem">👤 ${name}</span>
        <button class="btn btn-outline btn-sm" onclick="logout()" style="color:#fff;border-color:rgba(255,255,255,0.6)">Çıkış</button>`;
    } else {
      location.href = 'login.html?next=my-tickets.html';
    }
  }

  async function logout() {
    const token = localStorage.getItem('flyticket_user_token');
    if (token) {
      await fetch(API + '/api/auth/logout', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      }).catch(() => {});
    }
    localStorage.removeItem('flyticket_user_token');
    localStorage.removeItem('flyticket_user_name');
    localStorage.removeItem('flyticket_user_email');
    location.href = 'index.html';
  }

  async function loadTickets() {
    const token = localStorage.getItem('flyticket_user_token');
    const container = document.getElementById('tickets-list');

    const res = await fetch(API + '/api/auth/my-tickets', {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (!res.ok) {
      container.innerHTML = '<div class="empty-state">Biletler yüklenemedi.</div>';
      return;
    }

    const tickets = await res.json();

    if (!tickets.length) {
      container.innerHTML = `
        <div style="text-align:center;padding:3rem 1rem;color:var(--muted)">
          <div style="font-size:3rem;margin-bottom:1rem">🎫</div>
          <p style="font-size:1rem;margin-bottom:1rem">Henüz biletiniz yok.</p>
          <a href="index.html" class="btn btn-primary">Uçuş Ara</a>
        </div>`;
      return;
    }

    container.innerHTML = tickets.map(t => {
      const isPast = new Date(t.departure_time) < new Date();
      return `
        <div class="my-ticket-card ${isPast ? 'ticket-past' : ''}">
          <div class="my-ticket-left">
            <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.4rem">
              <span style="font-size:1rem;font-weight:800;color:var(--text)">${t.departure_city}</span>
              <span style="color:var(--primary);font-size:1.1rem">→</span>
              <span style="font-size:1rem;font-weight:800;color:var(--text)">${t.arrival_city}</span>
              <span class="flight-number">${t.flight_number}</span>
              ${t.airline_name ? `<span class="airline-badge">${t.airline_code} · ${t.airline_name}</span>` : ''}
              ${isPast ? '<span class="badge badge-red">Geçmiş</span>' : '<span class="badge badge-green">Yaklaşan</span>'}
            </div>
            <div style="font-size:0.83rem;color:var(--muted)">
              ${fmt(t.departure_time)} → ${fmt(t.arrival_time)}
            </div>
            <div style="font-size:0.83rem;color:var(--muted);margin-top:0.2rem">
              ${t.passenger_name} ${t.passenger_surname} &nbsp;·&nbsp; ${t.passenger_email}
            </div>
          </div>
          <div class="my-ticket-right">
            <div style="font-size:0.7rem;color:var(--muted);text-align:center;margin-bottom:2px">REZERVASYON KODU</div>
            <div style="font-size:1rem;font-weight:800;color:var(--primary);letter-spacing:2px">${t.booking_reference}</div>
            <div style="margin-top:6px">
              <span style="background:var(--primary);color:#fff;padding:3px 10px;border-radius:20px;font-size:0.78rem;font-weight:700">
                Koltuk ${seatLabel(t.seat_number)}
              </span>
            </div>
            <div style="font-size:0.82rem;font-weight:700;color:var(--primary);margin-top:6px">
              ₺${Number(t.price).toLocaleString('tr-TR')}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  setupNav();
  loadTickets();
</script>
</body>
</html>
